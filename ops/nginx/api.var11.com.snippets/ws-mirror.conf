# Mirror Sofascore WebSocket — wss://api.var11.com/ws/v1
# + health probe at https://api.var11.com/ws/health
#
# Insert this file via:
#   include /etc/nginx/fastpanel2-sites/var11_com_usr/api.var11.com.includes;
# already pulls in /etc/nginx/fastpanel2-includes/*.conf, but those are
# global. We mount this snippet directly inside the api.var11.com server
# block (see the conf delta in this repo's commit).
#
# Backend: sofascore-ws-server.service binds 127.0.0.1:8001 (do NOT
# expose externally — TLS terminates here).

# Health probe — short timeout, no upgrade.
location = /ws/health {
    proxy_pass http://127.0.0.1:8001/ws/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 5s;
    proxy_connect_timeout 2s;
}

# WebSocket upgrade — pass Upgrade/Connection so nginx hands the
# connection off to FastAPI's WS handler, then never times out.
location = /ws/v1 {
    proxy_pass http://127.0.0.1:8001/ws/v1;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Keep the connection open indefinitely; the WS server handles
    # its own PING/PONG heartbeat every 20s (configured in uvicorn
    # ws_ping_interval=20.0).
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    # Disable buffering — pushes need to reach the client immediately.
    proxy_buffering off;
}
