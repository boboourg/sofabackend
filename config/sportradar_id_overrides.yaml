# P3.2 — Manual ID override config for Sportradar coverage reconciliation.
#
# Purpose: when blind ID match fails (Sportradar's sr:competition:N points
# to a different Sofascore unique_tournament than ID would suggest) AND
# name fuzzy match is ambiguous, we encode the correct mapping here.
#
# Format:
#   overrides:
#     <sport_slug>:
#       <sportradar_competition_id>: <sofascore_unique_tournament_id>
#
# Verified collisions found via empirical 100-sample probe (2026-05-08):
# All 3 are football regional cup competitions where Sportradar and
# Sofascore assigned different IDs to the same competition.
#
# When adding entries: leave a comment with the competition name and
# country to make manual review easy. The reconciliation pipeline reads
# this file and produces method='manual', confidence=1.0 rows.

overrides:
  football:
    # Sportradar ID 2110 = "Kings Cup" Saudi Arabia
    # In Sofascore: ID 2110 = "Division 3 Nordöstra Götaland" (Sweden Amateur)
    # Sofascore's actual King's Cup Saudi Arabia is ID 2058
    2110: 2058

    # Sportradar ID 2296 = "Super Cup" Saudi Arabia
    # In Sofascore: ID 2296 = "West Bank League" (Palestine)
    # Sofascore's actual Saudi Super Cup is ID 2119
    2296: 2119

    # Sportradar ID 2462 = "King of Bahrain Cup" (Bahrain football)
    # In Sofascore: ID 2462 = "Miami, Doubles" (TENNIS — cross-sport collision!)
    # Sofascore's actual Bahrain King's Cup is ID 2736
    2462: 2736
