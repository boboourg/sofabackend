<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sofascore Admin{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.3" integrity="sha384-0895/pl2MU10Hqc6jd4RvrAumzVa2Veb86xCl0jc7q88t6Voc6PiV4xkn4lZ+SY/" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #0d1117;
      --bg-soft: #161b22;
      --bg-card: #1c2128;
      --fg: #c9d1d9;
      --fg-muted: #8b949e;
      --accent: #58a6ff;
      --accent-soft: rgba(88, 166, 255, 0.12);
      --danger: #f85149;
      --danger-soft: rgba(248, 81, 73, 0.12);
      --success: #3fb950;
      --warning: #d29922;
      --border: #30363d;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-size: 14px;
      line-height: 1.5;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header.topbar {
      background: var(--bg-soft);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header.topbar h1 { font-size: 16px; margin: 0; font-weight: 600; }
    header.topbar .meta { color: var(--fg-muted); font-size: 12px; }
    .layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 0;
      min-height: calc(100vh - 41px);
    }
    nav.sidebar {
      background: var(--bg-soft);
      border-right: 1px solid var(--border);
      padding: 20px 0;
    }
    nav.sidebar a.nav-item {
      display: block;
      padding: 8px 24px;
      color: var(--fg);
      border-left: 3px solid transparent;
      text-decoration: none;
    }
    nav.sidebar a.nav-item:hover { background: var(--accent-soft); border-left-color: var(--accent); text-decoration: none; }
    nav.sidebar a.nav-item.active { background: var(--accent-soft); border-left-color: var(--accent); color: var(--accent); }
    nav.sidebar .nav-section {
      padding: 16px 24px 4px 24px;
      color: var(--fg-muted);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
    }
    main.content { padding: 24px 32px; }
    main.content h2 { margin-top: 0; }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h3 { margin-top: 0; font-size: 14px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--fg-muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
    tbody tr:hover { background: var(--bg-soft); }
    .btn {
      display: inline-block;
      padding: 6px 14px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
    }
    .btn:hover { opacity: 0.85; text-decoration: none; }
    .btn-secondary { background: var(--bg-soft); color: var(--fg); border: 1px solid var(--border); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .tier-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .tier-pill.tier_1 { background: #f85149; color: white; }
    .tier-pill.tier_2 { background: #d29922; color: #0d1117; }
    .tier-pill.tier_3 { background: #6e7681; color: white; }
    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block;
      font-size: 12px;
      color: var(--fg-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-row input, .form-row select, .form-row textarea {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
    }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .flash {
      padding: 10px 14px;
      border-radius: 4px;
      margin-bottom: 14px;
      font-size: 13px;
    }
    .flash.success { background: rgba(63, 185, 80, 0.12); color: var(--success); border: 1px solid var(--success); }
    .flash.danger { background: var(--danger-soft); color: var(--danger); border: 1px solid var(--danger); }
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }
    .toolbar input[type="search"] {
      flex: 1;
      max-width: 400px;
      padding: 8px 12px;
      background: var(--bg-soft);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 13px;
    }
    .text-muted { color: var(--fg-muted); }
    .empty-state {
      padding: 40px;
      text-align: center;
      color: var(--fg-muted);
    }
    code {
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 12px;
      font-family: "SF Mono", Menlo, monospace;
    }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <h1>Sofascore Admin</h1>
    <span class="meta">v0 · {{ now_iso }}</span>
  </header>
  <div class="layout">
    <nav class="sidebar">
      <div class="nav-section">Live</div>
      <a class="nav-item {% if active == 'tier_overrides' %}active{% endif %}" href="/admin/tier-overrides">Tier overrides</a>
      <div class="nav-section">Метаданные</div>
      <a class="nav-item disabled text-muted" title="Admin-2 (планируется)">Categories</a>
      <a class="nav-item disabled text-muted" title="Admin-2 (планируется)">Tournaments</a>
      <div class="nav-section">События</div>
      <a class="nav-item disabled text-muted" title="Admin-3 (планируется)">Events</a>
      <a class="nav-item disabled text-muted" title="Admin-3 (планируется)">Score overrides</a>
      <div class="nav-section">Ops</div>
      <a class="nav-item disabled text-muted" title="Admin-4 (планируется)">Dashboard</a>
      <a class="nav-item disabled text-muted" title="Admin-4 (планируется)">Jobs runs</a>
    </nav>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
